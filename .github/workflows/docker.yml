name: Build and Push Space Docker Image

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: Build mode
        required: true
        default: full
        type: choice
        options:
          - full
          - mini

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - id: lower-repo
        shell: pwsh
        run: |
          "::set-output name=repository::$($env:GITHUB_REPOSITORY.ToLowerInvariant())"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./docker
          file: ./docker/Dockerfile${{ inputs.build_mode == 'mini' && '-mini' || '' }}
          push: true
          tags: |
            ghcr.io/${{ steps.lower-repo.outputs.repository }}/gitea-code-server:4.127.0-trixie${{ inputs.build_mode == 'mini' && '-mini' || '' }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Gitea-Code-Server Docker Image
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha,scope=${{ inputs.build_mode }}
          cache-to: type=gha,mode=max,scope=${{ inputs.build_mode }}
