name: Release Rust Binary

on:
  workflow_dispatch:

permissions:
  contents: write # Crucial permission required to create the GitHub Release and upload assets

jobs:
  build-and-release:
    name: Build and Release for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: workspace-manager-linux-x86_64_gnu
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact_name: workspace-manager-linux-x86_64_musl
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: workspace-manager-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: workspace-manager-macos-arm64
          # - target: x86_64-pc-windows-msvc
          #   os: windows-latest
          #   artifact_name: workspace-manager-windows-x86_64.exe

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          
      - name: Install musl toolchain (Linux musl only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools build-essential pkg-config clang

      - name: Enable Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Compile Binary (Release Mode)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare Binary Artifacts
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cd target/${{ matrix.target }}/release/
            mv workspace-manager.exe ../../../${{ matrix.artifact_name }}
          else
            cd target/${{ matrix.target }}/release/
            mv workspace-manager ../../../${{ matrix.artifact_name }}
          fi

      - name: Publish Artifact to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v0.02
          files: ${{ matrix.artifact_name }}
          generate_release_notes: true
